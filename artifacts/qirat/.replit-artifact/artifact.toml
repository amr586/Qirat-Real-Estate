kind = "web"
previewPath = "/"
title = "قيراط - Qirat Real Estate"
version = "1.0.0"
id = "artifacts/qirat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19709

[services.development]
run = "pnpm --filter @workspace/qirat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qirat", "run", "build" ]
publicDir = "artifacts/qirat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19709"
BASE_PATH = "/"
